# Edge-NET DHCP server
# Fixed addresses assigned by MAC — nodes get predictable IPs
# All nodes connect via WiFi (athn0); ethernet is optional home network uplink only

subnet 10.1.1.0 netmask 255.255.255.0 {
    option routers 10.1.1.1;
    range 10.1.1.100 10.1.1.199;

    # Linux SBCs (.10–.19)
    host edge-net-keybow {
        hardware ethernet <KEYBOW_MAC>;
        fixed-address 10.1.1.10;
    }
    host edge-net-automation {
        hardware ethernet <AUTOMATION_MAC>;
        fixed-address 10.1.1.11;
    }

    # Microcontrollers (.20–.29)
    host edge-net-gfx {
        hardware ethernet <GFX_MAC>;
        fixed-address 10.1.1.20;
    }
    host edge-net-plasma {
        hardware ethernet <PLASMA_MAC>;
        fixed-address 10.1.1.21;
    }
}
