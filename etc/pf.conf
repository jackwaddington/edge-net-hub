# Edge-NET pf firewall rules
# Hub: Raspberry Pi 4 · OpenBSD

ext_if  = "em0"    # ethernet uplink to home network (optional)
wifi_if = "athn0"  # WiFi AP — nodes connect here

wifi_net    = "10.1.1.0/24"
linux_nodes = "{ 10.1.1.10, 10.1.1.11 }"
mcu_nodes   = "{ 10.1.1.20, 10.1.1.21 }"

set skip on lo

block all

# MQTT broker — all nodes
pass in on $wifi_if proto tcp to $wifi_if port 1883 keep state

# Linux nodes can reach each other (SSH etc.)
pass in on $wifi_if from $linux_nodes to $wifi_net keep state

# NAT — traffic out to home network when ethernet uplink is present
match out on $ext_if from $wifi_net nat-to ($ext_if)
pass out on $ext_if keep state

# GFX → home network (Prometheus/Grafana, k3s)
# Uncomment and fill in once home network IPs are confirmed:
# pass in on $wifi_if from 10.1.1.20 to <home-network> keep state
